services:
  # Linux PHP 环境
  php-apache:
    image: php:8.1-apache
    container_name: cyberrange-php
    ports:
      - "20000:80"
    volumes:
      - ./html:/var/www/html
      - ./webshell:/var/www/html/webshell
    command: >
      bash -c "
      echo 'ServerName localhost' >> /etc/apache2/apache2.conf && 
      sed -i 's/Options Indexes FollowSymLinks/Options +Indexes +FollowSymLinks/g' /etc/apache2/apache2.conf &&
      a2enmod rewrite && 
      apache2-foreground"
    networks:
      - cyberrange-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Linux Tomcat Java 环境 (支持 JSP/JSPX)
  tomcat:
    image: tomcat:9.0-jdk11
    container_name: cyberrange-tomcat
    ports:
      - "20001:8080"
    volumes:
      - ./tomcat-webapps/ROOT:/usr/local/tomcat/webapps/ROOT
      - ./webshell:/usr/local/tomcat/webapps/ROOT/webshell
    environment:
      - CATALINA_OPTS=-Xmx512m -Xms256m
    networks:
      - cyberrange-network
    restart: unless-stopped
    depends_on:
      - php-apache
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  cyberrange-network:
    driver: bridge

